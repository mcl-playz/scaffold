name: Maven Package & Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        server-id: github
        settings-path: ${{ github.workspace }}

    # Deploys the unshaded JAR to GitHub Packages
    - name: Deploy to GitHub Packages
      run: mvn -B deploy -X -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ github.token }}

    # Uploads both the unshaded and shaded JARs to the Release Assets
    - name: Upload Release Assets
      if: github.event_name == 'release' # Only runs if triggered by a Release, not manual trigger
      uses: softprops/action-gh-release@v2
      with:
        files: |
          target/*.jar
          !target/original-*.jar
      env:
        GITHUB_TOKEN: ${{ github.token }}
